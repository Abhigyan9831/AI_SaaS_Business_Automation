apiVersion: v1
kind: Namespace
metadata:
  name: pont-ai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: pont-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: pont_admin
        - name: POSTGRES_PASSWORD
          value: pont_password
        - name: POSTGRES_DB
          value: pont_db
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pont-ai
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: pont-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: pont-ai
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pont-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: pont-backend:latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          value: postgres://pont_admin:pont_password@postgres:5432/pont_db
        - name: REDIS_URL
          value: redis://redis:6379
        - name: JWT_SECRET
          value: super_secret_key
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: pont-ai
spec:
  ports:
  - port: 3001
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: pont-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: pont-worker:latest
        env:
        - name: DATABASE_URL
          value: postgres://pont_admin:pont_password@postgres:5432/pont_db
        - name: REDIS_URL
          value: redis://redis:6379
