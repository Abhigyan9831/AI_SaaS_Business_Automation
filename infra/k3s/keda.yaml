apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scaler
  namespace: pont-ai
spec:
  scaleTargetRef:
    name: worker
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
  - type: redis
    metadata:
      address: redis:6379
      listName: "bull:xia-tasks:wait" # BullMQ default queue key for waiting jobs
      listLength: "5"
      activationListLength: "1"
